# Server Identity
server_name: "nats-leaf-2a"

# Network Configuration
port: 4227

# leaf Clustering Configuration
cluster {
    name: "leaf-2-cluster"
    port: 6237
    routes: [
        "nats://<LEAF_HOST_2b>:6238"
    ]
}

# Local JetStream
jetstream {
    domain: leaf-2
    store_dir: "/data/jetstream"
    max_memory_store: 512MB
    max_file_store: 5GB
}

# Leafnode Configuration
leafnodes {
    remotes = [
        {
            urls: [
                "nats://exec_user:exec_password@<HUB_HOST_1>:7422",
                "nats://exec_user:exec_password@<HUB_HOST_2>:7423",
                "nats://exec_user:exec_password@<HUB_HOST_3>:7424"
            ]
            account: "app"
        }
    ]
    reconnect: 1s
}

# HTTP Monitoring
http_port: 8227

# System Account Configuration
system_account: SYS

accounts: {
    app: {
        jetstream: enabled
        users: [
            {
                user: "leaf_user",
                password: "leaf_password",
                permissions: {
                    publish: ">",
                    subscribe: ">"
                }
            },
            {
                user: "exec_user",
                password: "exec_password",
                permissions: {
                    publish: ">",
                    subscribe: ">"
                } 
            }
        ]
    },
    SYS: {
        users: [
            {
                user: "sys",
                password: "sys_password",
                permissions: {
                    publish: ">",
                    subscribe: ">",
                    allow_responses: true
                }
            }
        ]
    }
}
